<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Insumos · Exportação</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>
  <div class="tela-login">
    <div class="card card-login">
      <div class="card-header">
        Controle de Insumos · Exportação
      </div>
      <div class="text-center pt-4 px-4">
        <img src="/logo.png" alt="Pietrobon" style="height:60px;object-fit:contain;">
      </div>
      <div class="card-body p-4">
        <form id="form-login">
          <div class="mb-3">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" id="campo-email" class="form-control form-control-lg" placeholder="seu@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Senha</label>
            <input type="password" id="campo-senha" class="form-control form-control-lg" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-pietrobon w-100 btn-lg">Entrar</button>
          <p id="mensagem-erro" class="text-danger text-center mt-3 mb-0 small"></p>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="/JS/login.js"></script>
</body>
</html>
