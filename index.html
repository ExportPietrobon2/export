<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Insumos · Exportação</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ED3237">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pietrobon">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>
  <div class="tela-login">
    <div class="login-box">
      <div class="login-topo">
        <img src="/logo.png" alt="Pietrobon" class="login-logo">
        <p class="login-subtitulo">Controle de Insumos · Exportação</p>
      </div>
      <div class="login-corpo">
        <form id="form-login">
          <div class="mb-3">
            <label class="form-label fw-semibold small">E-mail</label>
            <input type="email" id="campo-email" class="form-control form-control-lg" placeholder="seu@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Senha</label>
            <input type="password" id="campo-senha" class="form-control form-control-lg" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-pietrobon w-100 btn-lg">Entrar</button>
          <p id="mensagem-erro" class="text-danger text-center mt-3 mb-0 small"></p>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="/JS/login.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
    }
  </script>
</body>
</html>
