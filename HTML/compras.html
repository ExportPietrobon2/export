<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras · Pietrobon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ED3237">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body data-pagina="compras.html">
  <div id="cabecalho"></div>
  <div class="container py-4">

    <div class="page-header">
      <div class="page-header-icon">🛒</div>
      <div class="page-header-texto">
        <h1 class="page-titulo">Compras</h1>
        <p class="page-subtitulo">Registre e acompanhe a compra de insumos e a previsão de chegada</p>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="abas-compras">
      <li class="nav-item"><button class="nav-link active" data-aba-compra="registro">📝 Compras</button></li>
      <li class="nav-item"><button class="nav-link" data-aba-compra="sugestoes">💡 O que comprar</button></li>
      <li class="nav-item"><button class="nav-link" data-aba-compra="entradas">📦 Entradas B2</button></li>
    </ul>

    <div id="aba-registro">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <h5 class="fw-bold mb-3">🛒 Registrar Compra</h5>
          <form id="form-compra">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold small">O que está comprando *</label>
                <input type="text" id="c-descricao" class="form-control" placeholder="Ex: Rótulo Bala Dura 65mm" required>
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label fw-semibold small">Fornecedor</label>
                <input type="text" id="c-fornecedor" class="form-control" placeholder="Opcional">
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label fw-semibold small">Quantidade</label>
                <input type="number" id="c-quantidade" class="form-control" placeholder="0" min="0" step="any">
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label fw-semibold small">Unidade</label>
                <input type="text" id="c-unidade" class="form-control" placeholder="kg / un / pallet">
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label fw-semibold small">Data da compra</label>
                <input type="date" id="c-data-compra" class="form-control">
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label fw-semibold small">Chegada prevista</label>
                <input type="date" id="c-data-prevista" class="form-control">
              </div>
            </div>
            <button type="submit" class="btn btn-ok-grande w-100 mt-3" id="btn-salvar-compra">✔ Registrar Compra</button>
          </form>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-3 mb-3">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="toggle-ocultar-recebidas">
          <label class="form-check-label fw-semibold small" for="toggle-ocultar-recebidas">Ocultar compras já recebidas</label>
        </div>
      </div>

      <div id="lista-compras"><p class="text-muted">Carregando...</p></div>
    </div>

    <div id="aba-sugestoes" style="display:none">
      <div id="conteudo-sugestoes"><p class="text-muted">Carregando...</p></div>
    </div>

    <div id="aba-entradas" style="display:none">
      <div id="conteudo-entradas"><p class="text-muted">Carregando...</p></div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/JS/compras.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js") }</script>
</body>
</html>
