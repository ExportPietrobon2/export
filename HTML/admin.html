<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visão Geral das PIs · Pietrobon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ED3237">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body data-pagina="admin.html">
  <div id="cabecalho"></div>
  <div class="container py-4">

    <div class="page-header">
      <div class="page-header-icon">📊</div>
      <div class="page-header-texto">
        <h1 class="page-titulo">Visão Geral das PIs</h1>
        <p class="page-subtitulo">Insumos do almoxarifado, recebimentos do B2 e status de produção de cada PI</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">✅</div>
          <div class="display-6 fw-bold text-success" id="numero-liberados">0</div>
          <small class="text-muted fw-semibold">PIs Liberadas</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">🚫</div>
          <div class="display-6 fw-bold text-danger" id="numero-bloqueados">0</div>
          <small class="text-muted fw-semibold">PIs Bloqueadas</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">📋</div>
          <div class="display-6 fw-bold text-warning" id="numero-total">0</div>
          <small class="text-muted fw-semibold">PIs em Andamento</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">🏁</div>
          <div class="display-6 fw-bold text-secondary" id="numero-concluidas">0</div>
          <small class="text-muted fw-semibold">PIs Concluídas</small>
        </div>
      </div>
    </div>

    <div class="form-check form-switch mb-3">
      <input class="form-check-input" type="checkbox" id="toggle-concluidas">
      <label class="form-check-label fw-semibold small" for="toggle-concluidas">Mostrar PIs concluídas</label>
    </div>

    <div id="container-pis"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/JS/admin.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js") }</script>
</body>
</html>
