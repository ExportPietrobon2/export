<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin · Pietrobon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body data-pagina="admin.html">
  <div id="cabecalho"></div>
  <div class="container py-4">
    <h1 class="page-titulo">Painel Administrativo</h1>
    <p class="page-subtitulo">Visão completa por PI — recebimento, almoxarifado e status.</p>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center py-3">
          <div class="display-6 fw-bold text-success" id="numero-liberados">0</div>
          <small class="text-muted">PIs Liberadas</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center py-3">
          <div class="display-6 fw-bold text-danger" id="numero-bloqueados">0</div>
          <small class="text-muted">PIs Bloqueadas</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center py-3">
          <div class="display-6 fw-bold text-warning" id="numero-total">0</div>
          <small class="text-muted">PIs Ativas</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center py-3">
          <div class="display-6 fw-bold text-secondary" id="numero-concluidas">0</div>
          <small class="text-muted">Concluídas</small>
        </div>
      </div>
    </div>

    <div class="form-check form-switch mb-3">
      <input class="form-check-input" type="checkbox" id="toggle-concluidas">
      <label class="form-check-label" for="toggle-concluidas">Mostrar PIs concluídas</label>
    </div>

    <div id="container-pis"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/JS/admin.js"></script>
</body>
</html>
