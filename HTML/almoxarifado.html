<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almoxarifado · Pietrobon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ED3237">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body data-pagina="almoxarifado.html">
  <div id="cabecalho"></div>
  <div class="container py-4">

    <div class="page-header">
      <div class="page-header-icon">🏭</div>
      <div class="page-header-texto">
        <h1 class="page-titulo">Almoxarifado</h1>
        <p class="page-subtitulo">Estoque de insumos e recebimentos do depósito B2</p>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="abas">
      <li class="nav-item">
        <button class="nav-link active" data-aba="estoque">📦 Estoque</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-aba="recebimentos">🚚 Recebimentos B2</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-aba="rendimentos">📐 Rendimentos</button>
      </li>
    </ul>

    <div id="aba-estoque">
      <div class="mb-4">
        <select id="select-pi" class="form-select form-select-lg">
          <option value="">Selecione a PI</option>
        </select>
      </div>
      <div id="conteudo-pi"></div>
    </div>

    <div id="aba-recebimentos" style="display:none">
      <div id="conteudo-recebimentos"></div>
    </div>

    <div id="aba-rendimentos" style="display:none">
      <div id="conteudo-referencia-wrapper-almox"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/JS/almoxarifado.js"></script>
  <script>
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js") }
  </script>
</body>
</html>
